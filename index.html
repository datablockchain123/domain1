<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Maintenance</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
            color: #cbd5f5;
        }
        .contact {
            margin-top: 25px;
            font-size: 16px;
            color: #94a3b8;
        }
        .email {
            color: #38bdf8;
            text-decoration: none;
        }
        .email:hover {
            text-decoration: underline;
        }
        .loader {
            margin: 30px auto;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>We'll Be Back Soon</h1>
        <div class="loader"></div>
        <p>
            Our website is currently undergoing scheduled maintenance and improvements.
            <br>
            We'll be back online shortly with a new experience.
        </p>

        <div class="contact">
            Contact:
            <a href="mailto:tests09893.01@gmail.com" class="email">
                tests09893.01@gmail.com
            </a>
        </div>
    </div>
</body>
</html>
